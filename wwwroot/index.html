<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitor Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <rect x="2" y="3" width="20" height="4" rx="1"/>
                    <rect x="2" y="10" width="20" height="4" rx="1"/>
                    <rect x="2" y="17" width="20" height="4" rx="1"/>
                    <circle cx="6" cy="5" r="0.5" fill="currentColor"/>
                    <circle cx="6" cy="12" r="0.5" fill="currentColor"/>
                    <circle cx="6" cy="19" r="0.5" fill="currentColor"/>
                </svg>
                Server Monitor Dashboard
            </h1>
            <div class="last-update">
                Last updated: <span id="last-update-time">Never</span>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">Total Servers</div>
                <div class="stat-value" id="total-servers">6</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Online</div>
                <div class="stat-value stat-success" id="online-servers">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Slow</div>
                <div class="stat-value stat-warning" id="slow-servers">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Offline</div>
                <div class="stat-value stat-danger" id="offline-servers">-</div>
            </div>
        </div>

        <div class="server-grid" id="server-grid">
            <!-- Server cards will be dynamically inserted here -->
        </div>

        <div class="footer">
            <button id="refresh-btn" class="refresh-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                </svg>
                Refresh Now
            </button>
            <div class="auto-refresh">
                <label>
                    <input type="checkbox" id="auto-refresh-toggle" checked>
                    Auto-refresh every 10 seconds
                </label>
            </div>
        </div>
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
